<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heera Store | Motion Experience</title>
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <style>
        :root {
            --primary: #900c3f;
            --dark: #0f0f13;
            --gold: #c5a059;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--dark); color: #fff; overflow-x: hidden; }

        /* Video/Motion Hero Section */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(15,15,19,0.7), rgba(15,15,19,0.7)), 
                        url('https://images.unsplash.com/photo-1558769132-cb1aea458c5e?auto=format&fit=crop&w=1200&q=80'); /* Replace with your video/gif link */
            background-size: cover;
            background-position: center;
        }

        .hero h1 {
            font-size: 4rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 10px;
        }

        .hindi-gold {
            color: var(--gold);
            font-size: 1.5rem;
            margin: 20px 0;
            font-weight: bold;
        }

        /* Number Counter Styling */
        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 2rem;
            padding: 5rem 10%;
            background: #16161d;
        }
        .stat-box h2 {
            font-size: 3.5rem;
            color: var(--primary);
            margin-bottom: 5px;
        }

        /* Swipe Up Animation Class */
        [data-aos="fade-up"] {
            transition-timing-function: cubic-bezier(0.16, 1, 0.3, 1);
        }

        .btn-swipe {
            background: var(--primary);
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.4s;
            border: 2px solid transparent;
            margin-top: 20px;
        }
        .btn-swipe:hover {
            background: transparent;
            border-color: var(--primary);
            transform: translateY(-5px);
        }

        section { padding: 80px 10%; }
    </style>
</head>
<body>

    <div class="hero">
        <h1 data-aos="fade-up" data-aos-duration="1000">HEERA STORE</h1>
        <p class="sub" data-aos="fade-up" data-aos-delay="200">SINCE 1987 • WHOLESALE HUB</p>
        <p class="hindi-gold" data-aos="fade-up" data-aos-delay="400">समय बीतता गया। विश्वास बढ़ता गया।।</p>
        <a href="#" class="btn-swipe" data-aos="zoom-in" data-aos-delay="600">Explore Collection</a>
    </div>

    <section class="stats-container">
        <div class="stat-box" data-aos="fade-up">
            <h2 class="counter" data-target="37">0</h2>
            <p>Years of Legacy</p>
        </div>
        <div class="stat-box" data-aos="fade-up" data-aos-delay="100">
            <h2 class="counter" data-target="8500">0</h2>
            <p>Ready Products</p>
        </div>
        <div class="stat-box" data-aos="fade-up" data-aos-delay="200">
            <h2 class="counter" data-target="460">0</h2>
            <p>Cities Covered</p>
        </div>
        <div class="stat-box" data-aos="fade-up" data-aos-delay="300">
            <h2 class="counter" data-target="11000">0</h2>
            <p>Happy Retailers</p>
        </div>
    </section>

    <section style="text-align: center;">
        <h2 data-aos="fade-up">Our Premium Catalog</h2>
        <div style="width: 100px; height: 4px; background: var(--primary); margin: 20px auto;" data-aos="width-expand"></div>
        <p data-aos="fade-up" data-aos-delay="200">High-quality fabrics with motion-tested durability.</p>
    </section>

    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
        // Initialize Scroll Animations
        AOS.init({
            duration: 800,
            offset: 120,
            once: false
        });

        // Number Counter Logic
        const counters = document.querySelectorAll('.counter');
        const speed = 100; // The higher the slower

        const startCount = (entry) => {
            if(entry[0].isIntersecting) {
                counters.forEach(counter => {
                    const updateCount = () => {
                        const target = +counter.getAttribute('data-target');
                        const count = +counter.innerText;
                        const inc = target / speed;

                        if (count < target) {
                            counter.innerText = Math.ceil(count + inc);
                            setTimeout(updateCount, 20);
                        } else {
                            counter.innerText = target + '+';
                        }
                    };
                    updateCount();
                });
            }
        };

        // Observer to trigger counter when visible
        const observer = new IntersectionObserver(startCount, { threshold: 0.5 });
        observer.observe(document.querySelector('.stats-container'));

    </script>
</body>
</html>
