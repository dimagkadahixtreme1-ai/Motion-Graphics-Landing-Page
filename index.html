<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heera Store | High-End Motion</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Montserrat:wght@300;500&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #D4AF37;
            --black: #0a0a0a;
            --white: #ffffff;
            --font-main: 'Syne', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        body { 
            background-color: var(--black); 
            color: var(--white); 
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
        }

        /* Custom Cursor for 'Tagda' feel */
        #cursor {
            width: 20px; height: 20px; background: var(--gold);
            border-radius: 50%; position: fixed; pointer-events: none;
            z-index: 999; mix-blend-mode: difference; transition: transform 0.1s;
        }

        /* --- HERO SECTION: Reel Style Typography --- */
        .hero {
            height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            perspective: 1000px;
        }

        .hero h1 {
            font-family: var(--font-main);
            font-size: clamp(3rem, 15vw, 10rem);
            line-height: 0.8; text-transform: uppercase;
            letter-spacing: -5px;
        }

        .hero h1 span { display: block; }
        .hero .small-text { 
            font-size: 1rem; letter-spacing: 10px; margin-top: 20px; 
            color: var(--gold); text-transform: uppercase;
        }

        /* Typography Mix (Uchhi-Nichi Sizes) */
        .kinetic-text {
            padding: 100px 5%;
            font-family: var(--font-main);
            text-transform: uppercase;
        }

        .kinetic-text p {
            font-size: clamp(2rem, 5vw, 5rem);
            line-height: 1.1; margin-bottom: 50px;
        }

        .highlight { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.3em; color: var(--gold); }
        .thin { font-weight: 300; font-family: 'Montserrat'; font-size: 0.5em; vertical-align: middle; }

        /* --- SCROLL REVEAL CARDS --- */
        .reveal-section { padding: 100px 5%; }
        .image-container {
            position: relative; width: 100%; height: 80vh;
            margin: 100px 0; overflow: hidden; border-radius: 20px;
        }
        .image-container img {
            width: 100%; height: 120%; object-fit: cover;
            transform: scale(1.2);
        }
        .img-caption {
            position: absolute; bottom: 40px; left: 40px;
            font-size: 4rem; font-family: var(--font-main);
        }

        /* --- FOOTER --- */
        footer { padding: 100px 5%; border-top: 1px solid #333; text-align: center; }
        .footer-logo { font-size: 8vw; font-family: var(--font-main); opacity: 0.1; }

    </style>
</head>
<body>

    <div id="cursor"></div>

    <section class="hero">
        <div class="small-text">Bhopal's Legacy</div>
        <h1>
            <span class="reveal">HEERA</span>
            <span class="reveal" style="color: var(--gold);">STORE</span>
        </h1>
        <div class="small-text">EST. 1989</div>
    </section>

    <section class="kinetic-text">
        <p data-scroll data-scroll-speed="1">
            समय बीतता <span class="highlight">Gaya</span><br>
            <span class="thin">lekin</span> <br>
            VISHWAS <span style="font-size: 1.5em;">Bhadta</span> GAYA
        </p>
    </section>

    <section class="reveal-section">
        <div class="image-container">
            <img src="https://images.unsplash.com/photo-1558769132-cb1aea458c5e?q=80&w=2000" alt="Fashion" class="parallax-img">
            <div class="img-caption">ETHNIC.</div>
        </div>

        <div class="image-container">
            <img src="https://images.unsplash.com/photo-1490481651871-ab68de25d43d?q=80&w=2000" alt="Fashion" class="parallax-img">
            <div class="img-caption" style="color: var(--gold);">MODERN.</div>
        </div>
    </section>

    <footer>
        <div class="footer-logo">HEERA STORE</div>
        <p>Premium Wholesale Fashion Experience</p>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <script>
        // Custom Cursor movement
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            gsap.to(cursor, { x: e.clientX, y: e.clientY, duration: 0.1 });
        });

        // Hero Text Reveal
        gsap.from(".reveal", {
            y: 200, skewY: 10, duration: 1.5, stagger: 0.3, ease: "power4.out"
        });

        // Parallax Effect for Images
        gsap.utils.toArray('.parallax-img').forEach(img => {
            gsap.to(img, {
                yPercent: -20,
                ease: "none",
                scrollTrigger: {
                    trigger: img,
                    scrub: true
                }
            });
        });

        // Kinetic Typography Scroll Reveal
        gsap.from(".kinetic-text p", {
            opacity: 0, x: -100, duration: 1,
            scrollTrigger: {
                trigger: ".kinetic-text",
                start: "top 80%",
                end: "top 20%",
                scrub: 1
            }
        });
    </script>
</body>
</html>
